version: "1"
projects:
  - name: WAW
    environments:
      - name: Production
        services:
          - type: web
            name: WAW
            runtime: docker
            repo: https://github.com/salihchelebi/waw
            plan: free
            region: frankfurt
            branch: main
            dockerContext: .
            dockerfilePath: ./Dockerfile.render.blueprint
            dockerCommand: sh scripts/render-start.sh
            healthCheckPath: /api/v1/ping
            autoDeployTrigger: commit
            disk:
              name: flowise-data
              mountPath: /var/data
              sizeGB: 1
            envVars:
              # [TALİMAT NO: 3 | TALİMAT ADI: FLOWISE_FILE_STORAGE_PATH KEY’İNİ PRIMARY RENDER HATTINDA AÇIKÇA TANIMLA] Bu açıklama, primary Render hattında file storage root key’inin görünür hale getirildiğini gösterir.
              - key: FLOWISE_FILE_STORAGE_PATH
                value: /var/data/.flowise
              - key: DATABASE_URL
                sync: false
              - key: PORT
                sync: false
